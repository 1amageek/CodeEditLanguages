name: tests
on:
  workflow_dispatch:
  workflow_call:
jobs:
  code-edit-text-view-tests:
    name: Testing CodeEditLanguages
    runs-on: [self-hosted, macOS]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Restore SwiftPM cache
        uses: actions/cache@v4
        with:
          path: |
            .build/repositories
            .build/checkouts
            .build/artifacts
            .build/plugins
          key: ${{ runner.os }}-${{ runner.arch }}-codeeditlanguages-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-codeeditlanguages-spm-
            ${{ runner.os }}-${{ runner.arch }}-spm-
      - name: Testing Package
        run: exec ./.github/scripts/tests.sh arm
